<!DOCTYPE html>
<html>
<head>
<title>Blooming Sunflower</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #87ceeb, #fdf6c3);
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

/* Container for flower + text */
.flower-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Flower adjustments */
.flower {
  position: relative;
  width: 70vw;
  max-width: 300px;
  height: 70vw;
  max-height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px; /* space for text */
}

/* Center circle perfectly centered */
.center {
  position: absolute;
  width: 35%;
  height: 35%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, #5c3a00, #3b2500);
  border-radius: 50%;
}

/* Stem positioned below flower without overlapping text */
.stem {
  position: absolute;
  width: 5%;
  height: 60%;
  background: green;
  bottom: -60%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
}

/* Love text */
.love-text {
  font-size: clamp(16px, 5vw, 22px);
  font-weight: bold;
  color: #d62828;
  opacity: 0;
  margin-top: 10px; /* ensure space from stem */
  animation: fadeIn 2s ease forwards 2s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="flower-container">
  <div class="flower" id="sunflower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
    <div class="stem"></div>
  </div>

  <div class="love-text">
    I love you so much Cherryna 💛
  </div>
</div>

<script>
// Auto-bloom after page load
window.addEventListener('load', () => {
  const flower = document.getElementById('sunflower');
  setTimeout(() => {
    flower.classList.add('open');
  }, 500); // bloom starts after 0.5s
});
</script>

</body>
</html>
