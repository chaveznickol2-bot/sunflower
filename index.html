<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blooming Sunflower for Cherryna 🌻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #87ceeb, #fdf6c3);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .flower-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .flower {
      position: relative;
      width: 70vw;
      max-width: 320px;
      height: 70vw;
      max-height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-radius: 50%;
    }

    .petal {
      position: absolute;
      width: 24%;
      height: 48%;               /* reduced slightly for better centering */
      background: #ffc107;
      border-radius: 50% 50% 50% 0;
      transform-origin: 50% 80%;  /* raised origin → petals grow more symmetrically */
      transform: scale(0.1) rotate(0deg);
      transition: transform 2.1s cubic-bezier(0.25, 1.4, 0.5, 1.2);
      box-shadow: inset 0 -8px 12px rgba(0,0,0,0.08);
    }

    /* Staggered bloom */
    .petal:nth-child(1)  { --r: 0deg;   transition-delay: 0s; }
    .petal:nth-child(2)  { --r: 30deg;  transition-delay: 0.1s; }
    .petal:nth-child(3)  { --r: 60deg;  transition-delay: 0.2s; }
    .petal:nth-child(4)  { --r: 90deg;  transition-delay: 0.3s; }
    .petal:nth-child(5)  { --r: 120deg; transition-delay: 0.4s; }
    .petal:nth-child(6)  { --r: 150deg; transition-delay: 0.5s; }
    .petal:nth-child(7)  { --r: 180deg; transition-delay: 0.6s; }
    .petal:nth-child(8)  { --r: 210deg; transition-delay: 0.7s; }
    .petal:nth-child(9)  { --r: 240deg; transition-delay: 0.8s; }
    .petal:nth-child(10) { --r: 270deg; transition-delay: 0.9s; }
    .petal:nth-child(11) { --r: 300deg; transition-delay: 1.0s; }
    .petal:nth-child(12) { --r: 330deg; transition-delay: 1.1s; }

    .flower.open .petal {
      transform: rotate(var(--r)) scale(1);
    }

    .center {
      position: absolute;
      width: 34%;                /* slightly larger to fill better */
      height: 34%;
      top: 44%;                  /* ← key fix: pulled up from 50% */
      left: 50%;
      transform: translate(-50%, -52%);  /* fine-tune vertical centering */
      background: radial-gradient(circle at 30% 30%, #8d5524, #5c3a00 70%);
      border-radius: 50%;
      box-shadow: inset 0 6px 18px rgba(0,0,0,0.35);
      z-index: 2;
    }

    .stem {
      position: absolute;
      width: 14px;
      height: 210px;
      background: linear-gradient(to bottom, #2e7d32, #1b5e20);
      bottom: -68%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50% 50% 0 0;
      z-index: 1;
    }

    .love-text {
      font-size: clamp(20px, 6vw, 28px);
      font-weight: bold;
      color: #ffb300;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
      opacity: 0;
      margin-top: 20px;
      animation: fadeIn 2.5s ease forwards 2.8s;
      letter-spacing: 0.4px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .flower.open {
      animation: sway 4.5s ease-in-out infinite alternate;
    }

    @keyframes sway {
      0%   { transform: rotate(-1.8deg); }
      100% { transform: rotate(1.8deg); }
    }

    @media (max-height: 700px) {
      .flower { margin-bottom: 20px; }
      .stem { height: 170px; bottom: -58%; }
    }
  </style>
</head>
<body>

  <div class="flower-container">
    <div class="flower" id="sunflower">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="center"></div>
      <div class="stem"></div>
    </div>

    <div class="love-text">
      I love you so much Cherryna 💛
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const flower = document.getElementById('sunflower');
      setTimeout(() => {
        flower.classList.add('open');
      }, 600);
    });
  </script>

</body>
</html>
