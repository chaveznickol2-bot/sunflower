<!DOCTYPE html>
<html>
<head>
<title>Blooming Sunflower</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #87ceeb, #fdf6c3);
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Flower container */
.flower {
  position: relative;
  width: 250px;
  height: 250px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 30px;
}

/* Petals */
.petal {
  position: absolute;
  width: 60px;
  height: 140px;
  background: #f4c430;
  border-radius: 50%;
  transform-origin: bottom center;
  transform: scaleY(0.2);
  transition: transform 1.5s cubic-bezier(0.25, 1.5, 0.5, 1);
}

.petal:nth-child(1) { transform: rotate(0deg) scaleY(0.2); }
.petal:nth-child(2) { transform: rotate(30deg) scaleY(0.2); }
.petal:nth-child(3) { transform: rotate(60deg) scaleY(0.2); }
.petal:nth-child(4) { transform: rotate(90deg) scaleY(0.2); }
.petal:nth-child(5) { transform: rotate(120deg) scaleY(0.2); }
.petal:nth-child(6) { transform: rotate(150deg) scaleY(0.2); }
.petal:nth-child(7) { transform: rotate(180deg) scaleY(0.2); }
.petal:nth-child(8) { transform: rotate(210deg) scaleY(0.2); }
.petal:nth-child(9) { transform: rotate(240deg) scaleY(0.2); }
.petal:nth-child(10){ transform: rotate(270deg) scaleY(0.2); }
.petal:nth-child(11){ transform: rotate(300deg) scaleY(0.2); }
.petal:nth-child(12){ transform: rotate(330deg) scaleY(0.2); }

/* Bloom on hover */
.flower:hover .petal {
  transform: rotate(var(--r)) scaleY(1);
}

/* Center */
.center {
  position: absolute;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, #5c3a00, #3b2500);
  border-radius: 50%;
}

/* Stem */
.stem {
  position: absolute;
  width: 12px;
  height: 180px;
  background: green;
  bottom: -180px;
  border-radius: 6px;
}

/* Love Text */
.love-text {
  font-size: 22px;
  font-weight: bold;
  color: #d62828;
  animation: fadeIn 2s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="flower">
  <div class="petal" style="--r:0deg;"></div>
  <div class="petal" style="--r:30deg;"></div>
  <div class="petal" style="--r:60deg;"></div>
  <div class="petal" style="--r:90deg;"></div>
  <div class="petal" style="--r:120deg;"></div>
  <div class="petal" style="--r:150deg;"></div>
  <div class="petal" style="--r:180deg;"></div>
  <div class="petal" style="--r:210deg;"></div>
  <div class="petal" style="--r:240deg;"></div>
  <div class="petal" style="--r:270deg;"></div>
  <div class="petal" style="--r:300deg;"></div>
  <div class="petal" style="--r:330deg;"></div>
  <div class="center"></div>
  <div class="stem"></div>
</div>

<div class="love-text">
  I love you so much Cherryna 💛
</div>

</body>
</html>
