<!DOCTYPE html>
<html>
<head>
<title>Blooming Sunflower</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #87ceeb, #fdf6c3);
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

/* Flower container */
.flower {
  position: relative;
  width: 70vw; /* scales with phone screen */
  max-width: 300px;
  height: 70vw;
  max-height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
}

/* Petals */
.petal {
  position: absolute;
  width: 20%;
  height: 50%;
  background: #f4c430;
  border-radius: 50%;
  transform-origin: bottom center;
  transform: scaleY(0.2);
  transition: transform 1.8s cubic-bezier(0.25, 1.5, 0.5, 1);
}

/* Petal positions */
.petal:nth-child(1) { --r:0deg; }
.petal:nth-child(2) { --r:30deg; }
.petal:nth-child(3) { --r:60deg; }
.petal:nth-child(4) { --r:90deg; }
.petal:nth-child(5) { --r:120deg; }
.petal:nth-child(6) { --r:150deg; }
.petal:nth-child(7) { --r:180deg; }
.petal:nth-child(8) { --r:210deg; }
.petal:nth-child(9) { --r:240deg; }
.petal:nth-child(10){ --r:270deg; }
.petal:nth-child(11){ --r:300deg; }
.petal:nth-child(12){ --r:330deg; }

/* Bloom animation */
.flower.open .petal {
  transform: rotate(var(--r)) scaleY(1);
}

/* Center */
.center {
  position: absolute;
  width: 35%;
  height: 35%;
  background: radial-gradient(circle, #5c3a00, #3b2500);
  border-radius: 50%;
}

/* Stem */
.stem {
  position: absolute;
  width: 5%;
  height: 60%;
  background: green;
  bottom: -60%;
  border-radius: 50%;
}

/* Love Text */
.love-text {
  position: absolute
  font-size: 5vw;
  max-font-size: 22px;
  font-weight: bold;
  color: #d62828;
  opacity: 0;
  animation: fadeIn 2s ease forwards 2s; /* fade in after bloom */
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="flower" id="sunflower">
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="center"></div>
  <div class="stem"></div>
</div>

<div class="love-text">
  I love you so much Cherryna 💛
</div>

<script>
// Auto-bloom after page load
window.addEventListener('load', () => {
  const flower = document.getElementById('sunflower');
  setTimeout(() => {
    flower.classList.add('open');
  }, 500); // bloom starts after 0.5s
});
</script>

</body>
</html>
