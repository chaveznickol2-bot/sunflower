<!DOCTYPE html>
<html>
<head>
<title>Blooming Sunflower</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(to top, #87ceeb, #fdf6c3);
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Link */
a {
  position: absolute;
  top: 20px;
  text-decoration: none;
  font-weight: bold;
  color: #333;
}

/* Flower container */
.flower {
  position: relative;
  width: 250px;
  height: 250px;
}

/* Petals */
.petal {
  position: absolute;
  width: 60px;
  height: 140px;
  background: #f4c430;
  border-radius: 50%;
  top: 55px;
  left: 95px;
  transform-origin: bottom center;
  transform: scaleY(0.2);
  transition: transform 1.5s cubic-bezier(0.25, 1.5, 0.5, 1);
}

/* Arrange petals */
.petal:nth-child(1) { transform: rotate(0deg) scaleY(0.2); }
.petal:nth-child(2) { transform: rotate(30deg) scaleY(0.2); }
.petal:nth-child(3) { transform: rotate(60deg) scaleY(0.2); }
.petal:nth-child(4) { transform: rotate(90deg) scaleY(0.2); }
.petal:nth-child(5) { transform: rotate(120deg) scaleY(0.2); }
.petal:nth-child(6) { transform: rotate(150deg) scaleY(0.2); }
.petal:nth-child(7) { transform: rotate(180deg) scaleY(0.2); }
.petal:nth-child(8) { transform: rotate(210deg) scaleY(0.2); }
.petal:nth-child(9) { transform: rotate(240deg) scaleY(0.2); }
.petal:nth-child(10){ transform: rotate(270deg) scaleY(0.2); }
.petal:nth-child(11){ transform: rotate(300deg) scaleY(0.2); }
.petal:nth-child(12){ transform: rotate(330deg) scaleY(0.2); }

/* Bloom effect */
.flower.open .petal:nth-child(1) { transform: rotate(0deg) scaleY(1); }
.flower.open .petal:nth-child(2) { transform: rotate(30deg) scaleY(1); }
.flower.open .petal:nth-child(3) { transform: rotate(60deg) scaleY(1); }
.flower.open .petal:nth-child(4) { transform: rotate(90deg) scaleY(1); }
.flower.open .petal:nth-child(5) { transform: rotate(120deg) scaleY(1); }
.flower.open .petal:nth-child(6) { transform: rotate(150deg) scaleY(1); }
.flower.open .petal:nth-child(7) { transform: rotate(180deg) scaleY(1); }
.flower.open .petal:nth-child(8) { transform: rotate(210deg) scaleY(1); }
.flower.open .petal:nth-child(9) { transform: rotate(240deg) scaleY(1); }
.flower.open .petal:nth-child(10){ transform: rotate(270deg) scaleY(1); }
.flower.open .petal:nth-child(11){ transform: rotate(300deg) scaleY(1); }
.flower.open .petal:nth-child(12){ transform: rotate(330deg) scaleY(1); }

/* Center */
.center {
  position: absolute;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, #5c3a00, #3b2500);
  border-radius: 50%;
  top: 75px;
  left: 75px;
  z-index: 10;
}

/* Stem */
.stem {
  position: absolute;
  width: 12px;
  height: 200px;
  background: green;
  bottom: -200px;
  left: 119px;
  border-radius: 6px;
}

/* Button */
button {
  margin-top: 40px;
  padding: 10px 20px;
  border: none;
  background: #ffb703;
  cursor: pointer;
  border-radius: 20px;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #f4a300;
}
</style>
</head>
<body>

<a href="#sunflower">🌻 Open Flower</a>

<div id="sunflower" class="flower">
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="center"></div>
  <div class="stem"></div>
</div>

<button onclick="document.getElementById('sunflower').classList.toggle('open')">
  Bloom Sunflower 🌻
</button>

</body>
</html>
