<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blooming Sunflower for Cherryna 🌻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #87ceeb, #fdf6c3);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .flower-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .flower {
      position: relative;
      width: 70vw;
      max-width: 320px;
      height: 70vw;
      max-height: 320px;
      margin-bottom: 40px;
      border-radius: 50%;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .petal {
      position: absolute;
      width: 25%;
      height: 50%;
      background: #ffc107;
      border-radius: 50% 50% 50% 0;
      transform-origin: 50% 75%;  /* raised slightly → better symmetry on bloom */
      transform: scale(0.08) rotate(0deg);
      transition: transform 2.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset -4px -6px 10px rgba(0,0,0,0.1);
    }

    .petal:nth-child(1)  { --r: 0deg;   transition-delay: 0s; }
    .petal:nth-child(2)  { --r: 30deg;  transition-delay: 0.1s; }
    .petal:nth-child(3)  { --r: 60deg;  transition-delay: 0.2s; }
    .petal:nth-child(4)  { --r: 90deg;  transition-delay: 0.3s; }
    .petal:nth-child(5)  { --r: 120deg; transition-delay: 0.4s; }
    .petal:nth-child(6)  { --r: 150deg; transition-delay: 0.5s; }
    .petal:nth-child(7)  { --r: 180deg; transition-delay: 0.6s; }
    .petal:nth-child(8)  { --r: 210deg; transition-delay: 0.7s; }
    .petal:nth-child(9)  { --r: 240deg; transition-delay: 0.8s; }
    .petal:nth-child(10) { --r: 270deg; transition-delay: 0.9s; }
    .petal:nth-child(11) { --r: 300deg; transition-delay: 1.0s; }
    .petal:nth-child(12) { --r: 330deg; transition-delay: 1.1s; }

    .flower.open .petal {
      transform: rotate(var(--r)) scale(1);
    }

    .center {
      position: absolute;
      width: 36%;
      height: 36%;
      top: 42%;                      /* pulled up to match petal convergence */
      left: 50%;
      transform: translate(-50%, -55%);  /* extra vertical nudge upward */
      background: radial-gradient(circle at 35% 35%, #a16a3a, #5c3a00 65%);
      border-radius: 50%;
      box-shadow: inset 0 8px 20px rgba(0,0,0,0.4), 0 0 15px rgba(0,0,0,0.2);
      z-index: 2;
    }

    .stem {
      position: absolute;
      width: 14px;
      height: 220px;
      background: linear-gradient(#388e3c, #1b5e20);
      bottom: -70%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 7px 7px 0 0;
      z-index: 1;
    }

    .love-text {
      font-size: clamp(22px, 6.5vw, 30px);
      font-weight: bold;
      color: #ffb300;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.25);
      opacity: 0;
      margin-top: 25px;
      animation: fadeIn 2.8s ease forwards 2.9s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .flower.open {
      animation: sway 5s ease-in-out infinite alternate;
    }

    @keyframes sway {
      0%   { transform: rotate(-1.5deg); }
      100% { transform: rotate(1.5deg); }
    }

    @media (max-height: 680px) {
      .stem { height: 180px; bottom: -60%; }
      .flower { margin-bottom: 25px; }
    }
  </style>
</head>
<body>

  <div class="flower-container">
    <div class="flower" id="sunflower">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="center"></div>
      <div class="stem"></div>
    </div>

    <div class="love-text">
      I love you so much Cherryna 💛
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('sunflower').classList.add('open');
      }, 400);
    });
  </script>

</body>
</html>
