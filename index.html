<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blooming Rose for Cherryna 🌹</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #1a0d1a, #4b1d3f, #ff69b4);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
      overflow: hidden;
      color: #fff;
    }

    .flower-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .flower {
      position: relative;
      width: 70vw;
      max-width: 300px;
      height: 70vw;
      max-height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border-radius: 50%;
    }

    .petal {
      position: absolute;
      width: 40%;
      height: 60%;
      background: linear-gradient(to bottom, #ff3366, #c2185b);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      transform-origin: 50% 80%;
      transform: scale(0.1) rotate(0deg) translateY(20%);
      transition: transform 2.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
      z-index: 1;
    }

    /* Staggered bloom with spiral feel */
    .petal:nth-child(1)  { --r: 0deg;   transition-delay: 0s;    z-index: 12; }
    .petal:nth-child(2)  { --r: 45deg;  transition-delay: 0.15s; z-index: 11; }
    .petal:nth-child(3)  { --r: 90deg;  transition-delay: 0.3s;  z-index: 10; }
    .petal:nth-child(4)  { --r: 135deg; transition-delay: 0.45s; z-index: 9;  }
    .petal:nth-child(5)  { --r: 180deg; transition-delay: 0.6s;  z-index: 8;  }
    .petal:nth-child(6)  { --r: 225deg; transition-delay: 0.75s; z-index: 7;  }
    .petal:nth-child(7)  { --r: 270deg; transition-delay: 0.9s;  z-index: 6;  }
    .petal:nth-child(8)  { --r: 315deg; transition-delay: 1.05s; z-index: 5;  }

    .flower.open .petal {
      transform: rotate(var(--r)) scale(1) translateY(0);
    }

    .center {
      position: absolute;
      width: 28%;
      height: 28%;
      top: 45%;                  /* nudged up for rose layering */
      left: 50%;
      transform: translate(-50%, -60%);
      background: radial-gradient(circle at 40% 40%, #ffeb3b, #fbc02d 60%, #f57f17);
      border-radius: 50%;
      box-shadow: inset 0 5px 15px rgba(0,0,0,0.4);
      z-index: 13;
    }

    .stem {
      position: absolute;
      width: 12px;
      height: 240px;
      background: linear-gradient(to bottom, #2e7d32, #1b5e20);
      bottom: -75%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 6px 6px 0 0;
      z-index: 0;
    }

    .leaf {
      position: absolute;
      width: 40px;
      height: 80px;
      background: #388e3c;
      border-radius: 50% 50% 0 0;
      top: 60%;
      left: 50%;
      transform: translateX(-50%) rotate(30deg);
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
      z-index: -1;
    }

    .leaf:nth-child(2) {
      transform: translateX(-50%) rotate(-30deg);
    }

    .love-text {
      font-size: clamp(22px, 6.5vw, 32px);
      font-weight: bold;
      color: #ffeb3b;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
      opacity: 0;
      margin-top: 30px;
      animation: fadeIn 3s ease forwards 3s;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .flower.open {
      animation: sway 6s ease-in-out infinite alternate;
    }

    @keyframes sway {
      0%   { transform: rotate(-2deg); }
      100% { transform: rotate(2deg); }
    }

    @media (max-height: 700px) {
      .flower { margin-bottom: 30px; }
      .stem { height: 200px; bottom: -65%; }
    }
  </style>
</head>
<body>

  <div class="flower-container">
    <div class="flower" id="rose">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
   
      <div class="stem"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
    </div>

    <div class="love-text">
      I love you so much Cherryna 🌹❤️
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const rose = document.getElementById('rose');
      setTimeout(() => {
        rose.classList.add('open');
      }, 500);
    });
  </script>

</body>
</html>
