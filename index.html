<!DOCTYPE html>
<html>
<head>
<title>Blooming Sunflower</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #87ceeb, #fdf6c3);
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

/* Container for flower + text */
.flower-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Flower container */
.flower {
  position: relative;
  width: 70vw; /* scales with phone screen */
  max-width: 300px;
  height: 70vw;
  max-height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px; /* space for text */
}

/* Petals */
.petal {
  position: absolute;
  width: 20%;
  height: 50%;
  background: #f4c430;
  border-radius: 50%;
  transform-origin: bottom center;
  transform: scaleY(0.2) rotate(0deg);
  transition: transform 1.8s cubic-bezier(0.25, 1.5, 0.5, 1);
}

/* Petal positions and staggered delay */
.petal:nth-child(1) { --r:0deg; transition-delay: 0s; }
.petal:nth-child(2) { --r:30deg; transition-delay: 0.1s; }
.petal:nth-child(3) { --r:60deg; transition-delay: 0.2s; }
.petal:nth-child(4) { --r:90deg; transition-delay: 0.3s; }
.petal:nth-child(5) { --r:120deg; transition-delay: 0.4s; }
.petal:nth-child(6) { --r:150deg; transition-delay: 0.5s; }
.petal:nth-child(7) { --r:180deg; transition-delay: 0.6s; }
.petal:nth-child(8) { --r:210deg; transition-delay: 0.7s; }
.petal:nth-child(9) { --r:240deg; transition-delay: 0.8s; }
.petal:nth-child(10){ --r:270deg; transition-delay: 0.9s; }
.petal:nth-child(11){ --r:300deg; transition-delay: 1s; }
.petal:nth-child(12){ --r:330deg; transition-delay: 1.1s; }

/* Bloom animation */
.flower.open .petal {
  transform: rotate(var(--r)) scaleY(1);
}

/* Center perfectly aligned */
.center {
  position: absolute;
  width: 35%;
  height: 35%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, #5c3a00, #3b2500);
  border-radius: 50%;
}

/* Stem */
.stem {
  position: absolute;
  width: 5%;
  height: 60%;
  background: green;
  bottom: -60%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
}

/* Love Text */
.love-text {
  font-size: clamp(16px, 5vw, 22px);
  font-weight: bold;
  color: #d62828;
  opacity: 0;
  margin-top: 10px;
  animation: fadeIn 2s ease forwards 2s; /* fade in after bloom */
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Optional: gentle sway after bloom */
.flower.open {
  animation: sway 3s ease-in-out infinite alternate;
}

@keyframes sway {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(3deg); }
}
</style>
</head>
<body>

<div class="flower-container">
  <div class="flower" id="sunflower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
    <div class="stem"></div>
  </div>

  <div class="love-text">
    I love you so much Cherryna 💛
  </div>
</div>

<script>
// Auto-bloom after page load
window.addEventListener('load', () => {
  const flower = document.getElementById('sunflower');
  setTimeout(() => {
    flower.classList.add('open');
  }, 500); // bloom starts after 0.5s
});
</script>

</body>
</html>
